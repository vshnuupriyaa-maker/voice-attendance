<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VoxAttend</title>
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="home-page">
<div class="hero">
  <div class="hero-icon">🎙️</div>
  <h1>VoxAttend</h1>
  <p class="app-name-sub">AI Powered Smart Voice Attendance System</p>
  <p class="subtitle">Proxy-proof · Voice-first · Zero app install</p>
  <div class="hero-cards">
    <a href="/teacher" class="card card-teacher">
      <div class="card-icon">👨‍🏫</div>
      <h2>Teacher</h2>
      <p>Start session, generate QR, manage attendance</p>
    </a>
    <a href="/student" class="card card-student">
      <div class="card-icon">👨‍🎓</div>
      <h2>Student</h2>
      <p>Scan QR, verify with voice, mark attendance</p>
    </a>
  </div>
  <div class="features-strip">
    <span>🔒 Anti-Proxy</span>
    <span>🎯 Live Challenge</span>
    <span>🌐 Hindi + English</span>
    <span>🏆 Streaks</span>
    <span>😊 Mood Tracker</span>
  </div>
</div>
<script>
  window.addEventListener('load', () => {
    const msg = new SpeechSynthesisUtterance('Welcome to VoxAttend.');
    msg.rate = 0.95;
    msg.pitch = 1;
    window.speechSynthesis.speak(msg);
  });
</script>
</body>
</html>
